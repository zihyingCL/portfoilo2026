<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI/UX 設計作品集 | 現代簡約風格</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/style.css">

    <script src="js/components.js"></script>

</head>

<body>
    <div id="page-transition-overlay"></div>
    <div id="navbar-placeholder"></div>

    <!-- 內頁 Hero -->
    <section class="inner-hero">
        <div class="container">
            <h1 class="inner-title">Graphic Design</h1>
            <p class="inner-desc">品牌視覺與社群行銷素材，透過設計傳遞核心價值與視覺張力。</p>
        </div>
    </section>

    <!-- 作品展示區塊 -->
    <section id="works" class="container">
        <div class="portfolio-grid-full">
            <!-- 平面作品 1 (banner 類型) -->
            <div class="portfolio-item work-card">
                <div class="card-img img-placeholder-graphic"></div>
                <div class="card-content">
                    <div class="card-category"><i class="fas fa-paint-brush"></i> 平面 / 社群Banner</div>
                    <h3 class="card-title">春夏服飾系列視覺</h3>
                    <p class="card-desc">為服裝品牌設計的一組社群貼文與廣告banner，柔和色調與排版。</p>
                    <a href="#" class="btn-link">查看詳情 <i class="fas fa-arrow-right"></i></a>
                </div>
            </div>
            <!-- 平面作品 2 -->
            <div class="portfolio-item work-card">
                <div class="card-img img-placeholder-graphic"
                    style="background-image: linear-gradient(45deg, #cfb9a5, #eadacb);"></div>
                <div class="card-content">
                    <div class="card-category"><i class="fas fa-calendar-alt"></i> 活動視覺</div>
                    <h3 class="card-title">音樂節主視覺 & 延伸</h3>
                    <p class="card-desc">海報、手環、網站橫幅設計，統一風格的視覺系統。</p>
                    <a href="#" class="btn-link">查看詳情 <i class="fas fa-arrow-right"></i></a>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>

</body>

</html>
