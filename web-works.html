<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI/UX 設計作品集 | 現代簡約風格</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/style.css">

    <script src="js/components.js"></script>

</head>

<body>
    <div id="page-transition-overlay"></div>
    <div id="navbar-placeholder"></div>

    <!-- 內頁 Hero -->
    <section class="inner-hero">
        <div class="container">
            <h1 class="inner-title">Web Design</h1>
            <p class="inner-desc">專注於使用者體驗與前端技術的結合，打造流暢且美觀的網頁介面。</p>
        </div>
    </section>

    <!-- 作品展示區塊 -->
    <section id="works" class="container">
        <div class="portfolio-grid-full">
            <!-- 網頁作品範例 1 -->
            <div class="portfolio-item blog-style-card">
                <div class="work-type">
                    <span><i class="far fa-window-maximize"></i> 網頁設計</span>
                    <span>2025</span>
                </div>
                <h3>寂靜閱讀 · 個人部落格</h3>
                <p>簡約風格的內容平台，強調留白與字體層級。除了UI flow 展示，也整合外部連結。</p>
                <div class="blog-links">
                    <a href="#" class="btn-link" target="_blank"><i class="fas fa-external-link-alt"></i> 查看線上範例</a>
                    <a href="#" class="btn-link"><i class="fas fa-image"></i> 設計稿</a>
                </div>
            </div>
            <!-- 網頁作品範例 2 -->
            <div class="portfolio-item blog-style-card">
                <div class="work-type">
                    <span><i class="far fa-window-maximize"></i> 網頁設計</span>
                    <span>2024</span>
                </div>
                <h3>選物品牌 · 形象官網</h3>
                <p>RWD 切版，包含產品展示、動畫效果。可點擊連結至實際網站。</p>
                <div class="blog-links">
                    <a href="#" class="btn-link" target="_blank"><i class="fas fa-external-link-alt"></i> live demo</a>
                    <a href="#" class="btn-link"><i class="fas fa-code"></i> GitHub</a>
                </div>
            </div>
            <!-- 網頁作品範例 3 -->
            <div class="portfolio-item blog-style-card">
                <div class="work-type">
                    <span><i class="far fa-window-maximize"></i> 活動網頁</span>
                    <span>2023</span>
                </div>
                <h3>年末感謝祭 特別頁面</h3>
                <p>活動登陸頁面，包含倒數與表單。結合平面banner 設計，此處可切換多個連結。</p>
                <div class="blog-links">
                    <a href="#" class="btn-link" target="_blank"><i class="fas fa-external-link-alt"></i> 活動網站</a>
                    <a href="#" class="btn-link"><i class="fas fa-palette"></i> UI 稿</a>
                </div>
            </div>
        </div>
    </section>


    <div id="footer-placeholder"></div>

    <script src="js/main.js"></script>
</body>

</html>
